<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulador de Entrevista IA</title>

<style>

background:#f5f5f5;
margin:0;
padding:0;
}

header{
background:#2563eb;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

input,
textarea,
select{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
margin-top:10px;
padding:12px;
width:100%;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:.9;
}

.card{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.barra{
background:#ddd;
height:25px;
border-radius:20px;

}

.progresso{
height:100%;
transition:0.5s;

</head>

<body>

JSON.parse(
