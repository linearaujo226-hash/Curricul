<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulador de Entrevista IA</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
}

header{
background:#2563eb;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

input,
textarea,
select{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
margin-top:10px;
padding:12px;
width:100%;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:.9;
}

.card{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.barra{
background:#ddd;
height:25px;
border-radius:20px;
overflow:hidden;
}

.progresso{
height:100%;
background:#22c55e;
}

</style>

</head>

<body>

<header>
<h1>🎤 Contrata+ IA</h1>
</header>

<div class="container">

<h2>Simulador Inteligente de Entrevistas</h2>

<input
type="text"
id="cargo"
placeholder="Ex: Desenvolvedor Python">

<textarea
id="vaga"
placeholder="Cole aqui a descrição da vaga">
</textarea>

<select id="nivel">

<option>Iniciante</option>
<option>Intermediário</option>
<option>Sênior</option>

</select>

<select id="plano">

<option value="gratis">
🆓 Gratuito
</option>

<option value="pro">
🚀 Pro IA
</option>

</select>

<button onclick="gerarEntrevista()">
Iniciar Simulação
</button>

<div id="resultado"></div>

</div>

<script>

function gerarEntrevista(){

let cargo =
document.getElementById("cargo").value.trim();

let vaga =
(document.getElementById("vaga").value || "")
.toLowerCase();

let nivel =
document.getElementById("nivel").value;

let plano =
document.getElementById("plano").value;

if(cargo === ""){

document.getElementById("resultado").innerHTML = `
<div class="card">
<h3>⚠️ Informe o cargo.</h3>
</div>
`;

return;

}

let perguntas = [

"Fale sobre você.",
"Por que devemos contratar você?",
"Quais são seus pontos fortes?",
"Qual foi seu maior resultado profissional?"

];

if(nivel === "Intermediário"){

perguntas.push(
"Conte um desafio profissional que você superou."
);

perguntas.push(
"Como você trabalha sob pressão?"
);

}

if(nivel === "Sênior"){

perguntas.push(
"Como você lidera equipes?"
);

perguntas.push(
"Como toma decisões estratégicas?"
);

perguntas.push(
"Descreva um projeto de alto impacto."
);

}

/* ===========================
   MODO PRO IA
=========================== */

if(plano === "pro"){

if(
cargo.toLowerCase().includes("python")
){

perguntas.push(
"Explique orientação a objetos em Python."
);

perguntas.push(
"Quando utilizar threads e multiprocessing?"
);

perguntas.push(
"Como você estrutura APIs REST escaláveis?"
);

perguntas.push(
"Como faz tratamento de exceções?"
);

}

if(
cargo.toLowerCase().includes("dados")
){

perguntas.push(
"Explique a diferença entre JOIN e UNION."
);

perguntas.push(
"Como otimizar uma consulta SQL lenta?"
);

perguntas.push(
"Como construir dashboards executivos?"
);

}

if(vaga.includes("sql")){

perguntas.push(
"Descreva uma consulta SQL complexa que criou."
);

}

if(vaga.includes("excel")){

perguntas.push(
"Quais fórmulas avançadas do Excel utiliza?"
);

}

if(vaga.includes("power bi")){

perguntas.push(
"Como cria indicadores e dashboards?"
);

}

if(vaga.includes("liderança")){

perguntas.push(
"Descreva uma situação de liderança difícil."
);

}

if(vaga.includes("gestão")){

perguntas.push(
"Como define prioridades e metas?"
);

}

if(vaga.includes("atendimento")){

perguntas.push(
"Como lida com clientes insatisfeitos?"
);

}

if(vaga.includes("aws")){

perguntas.push(
"Quais serviços AWS você já utilizou?"
);

}

if(vaga.includes("docker")){

perguntas.push(
"Como funciona a conteinerização?"
);

}

if(vaga.includes("git")){

perguntas.push(
"Explique seu fluxo Git e GitHub."
);

}

}

/* ===========================
   SCORE
=========================== */

let score = 50;

if(cargo.length > 3){
score += 10;
}

if(nivel === "Intermediário"){
score += 20;
}

if(nivel === "Sênior"){
score += 35;
}

if(plano === "pro"){
score += 15;
}

if(score > 100){
score = 100;
}

/* ===========================
   RESULTADO
=========================== */

document.getElementById("resultado").innerHTML = `

<div class="card">

<h2>🎯 Simulação para ${cargo}</h2>

<p>
Nível:
<strong>${nivel}</strong>
</p>

<p>
Plano:
<strong>${plano.toUpperCase()}</strong>
</p>

<h3>🎤 Perguntas</h3>

<ol>

${perguntas.map(p => `
<li>${p}</li>
`).join("")}

</ol>

<h3>📊 Critérios Avaliados</h3>

<ul>

<li>Comunicação</li>

<li>Conhecimento Técnico</li>

<li>Liderança</li>

<li>Resolução de Problemas</li>

<li>Resultados Obtidos</li>

<li>Perfil Comportamental</li>

</ul>

<h3>📋 Dicas ATS</h3>

<ul>

<li>Utilize números e resultados.</li>

<li>Destaque tecnologias utilizadas.</li>

<li>Use palavras-chave da vaga.</li>

<li>Mostre impacto gerado.</li>

<li>Demonstre capacidade de resolver problemas.</li>

</ul>

<h3>🏆 Aprovação Estimada</h3>

<div class="barra">

<div
class="progresso"
style="width:${score}%;">
</div>

</div>

<p>

<strong>${score}%</strong>

de compatibilidade.

</p>

</div>

`;

}

</script>

</body>
</html>
