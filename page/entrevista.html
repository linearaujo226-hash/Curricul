<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Entrevista</title>
<link rel="stylesheet" href="../assets/style.css">
</head>

<body>

<header>
<h1>Contrata+ IA</h1>
</header>

<div class="container">

<h2>🎤 Simulador de Entrevista</h2>

<input
type="text"
id="cargo"
placeholder="Ex: Desenvolvedor Python, Analista de Dados, Gestor de Projetos">

<textarea
id="vaga"
placeholder="Cole aqui a descrição da vaga"
style="margin-top:10px;">
</textarea>

<select id="nivel">
<option>Iniciante</option>
<option>Intermediário</option>
<option>Sênior</option>
</select>

<button onclick="gerarEntrevista()">
Iniciar Simulação
</button>

<div id="resultado"></div>

</div>

<script>

function gerarEntrevista() {

let cargo =
document.getElementById("cargo").value.trim();

let vaga =
document.getElementById("vaga").value.toLowerCase();

let nivel =
document.getElementById("nivel").value;

if(cargo === ""){
document.getElementById("resultado").innerHTML = `
<div class="card">
<h3>⚠️ Informe o cargo desejado.</h3>
</div>
`;
return;
}
let perguntas = [

"Fale sobre você.",
"Por que devemos contratar você?",
"Quais são seus pontos fortes?",
"Qual foi seu maior resultado profissional?"

];

if(cargo.toLowerCase().includes("python")){

perguntas.push(
"Explique orientação a objetos em Python."
);

perguntas.push(
"Como você utiliza APIs REST?"
);

}
if(vaga.includes("liderança")){
perguntas.push(
"Descreva uma situação em que liderou uma equipe."
);
}

if(vaga.includes("excel")){
perguntas.push(
"Qual seu nível de Excel e quais recursos utiliza?"
);
}

if(vaga.includes("power bi")){
perguntas.push(
"Como você desenvolve indicadores e dashboards?"
);
}

if(vaga.includes("sql")){
perguntas.push(
"Explique uma consulta SQL complexa que já criou."
);
}

if(vaga.includes("gestão")){
perguntas.push(
"Como você organiza prioridades e metas?"
);
}

if(vaga.includes("atendimento")){
perguntas.push(
"Como você lida com clientes difíceis?"
);
}

if(cargo.toLowerCase().includes("dados")){

perguntas.push(
"Explique a diferença entre JOIN e UNION."
);

perguntas.push(
"Como você cria dashboards no Power BI?"
);

}

if(nivel === "Intermediário"){

perguntas.push(
"Conte um desafio profissional que você superou."
);

perguntas.push(
"Como você trabalha sob pressão?"
);

}

if(nivel === "Sênior"){

perguntas.push(
"Como você lidera equipes?"
);

perguntas.push(
"Como toma decisões estratégicas?"
);

perguntas.push(
"Descreva um projeto de alto impacto."
);

}
let score = 50;

if(nivel === "Intermediário"){
score += 20;
}

if(nivel === "Sênior"){
score += 40;
}

if(cargo.length > 3){
score += 10;
}

if(score > 100){
score = 100;
}


document.getElementById("resultado").innerHTML = `

<div class="card">

<h2>🎤 Simulação para ${cargo}</h2>

<p>
Nível selecionado:
<strong>${nivel}</strong>
</p>

<ol>
${perguntas.map(p => `
<li>${p}</li>
`).join("")}
</ol>

<h3>📊 Critérios de Avaliação</h3>

<ul>
<li>Comunicação</li>
<li>Conhecimento Técnico</li>
<li>Resolução de Problemas</li>
<li>Liderança</li>
<li>Resultados Obtidos</li>
</ul>

<h3>📋 Dicas ATS</h3>

<ul>
<li>Use resultados mensuráveis.</li>
<li>Destaque tecnologias utilizadas.</li>
<li>Mostre liderança e resolução de problemas.</li>
<li>Utilize palavras-chave da vaga.</li>
</ul>

<h3>🏆 Aprovação Estimada</h3>

<div style="
background:#ddd;
height:25px;
border-radius:20px;
overflow:hidden;
">

<div style="
width:${score}%;
height:100%;
background:#22c55e;
">
</div>

</div>

<p>
Probabilidade estimada:
<strong>${score}%</strong>
</p>

</div>

`;

}
</script>

</body>
</html>
