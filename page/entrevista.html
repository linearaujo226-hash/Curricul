<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulador de Entrevista IA</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
}

header{
background:#2563eb;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

input,
textarea,
select{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
margin-top:10px;
padding:12px;
width:100%;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:.9;
}

.card{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.barra{
background:#ddd;
height:25px;
border-radius:20px;
overflow:hidden;
}

.progresso{
height:100%;
transition:0.5s;
}

</style>

</head>

<body>

<header>
<h1>🎤 Contrata+ IA</h1>
</header>

<div class="container">

<h2>Simulador Inteligente de Entrevistas</h2>

<input
type="text"
id="cargo"
placeholder="Ex: Desenvolvedor Python">

<textarea
id="vaga"
placeholder="Cole aqui a descrição da vaga">
</textarea>

<select id="nivel">

<option>Iniciante</option>
<option>Intermediário</option>
<option>Sênior</option>

</select>

<select id="plano">

<option value="gratis">
🆓 Gratuito
</option>

<option value="pro">
🚀 Pro IA
</option>

</select>

<button onclick="gerarEntrevista()">
Iniciar Simulação
</button>

<div id="resultado"></div>

</div>

<script>

function gerarEntrevista(){

let cargo =
document.getElementById("cargo").value.trim();

let vaga =
(document.getElementById("vaga").value || "")
.toLowerCase();

let nivel =
document.getElementById("nivel").value;

let plano =
document.getElementById("plano").value;

if(cargo === ""){

document.getElementById("resultado").innerHTML = `
<div class="card">
<h3>⚠️ Informe o cargo.</h3>
</div>
`;

return;

}

let perguntas = [

"Fale sobre você.",
"Por que devemos contratar você?",
"Quais são seus pontos fortes?",
"Qual foi seu maior resultado profissional?"

];
const perguntasPremium = {

python: [
"Explique o conceito de orientação a objetos.",
"Qual a diferença entre lista e tupla?",
"Como você utiliza APIs REST em projetos?",
"Como funciona tratamento de exceções?",
"Explique o uso de decorators."
],

dados: [
"Explique JOIN e UNION.",
"Como você cria dashboards no Power BI?",
"Como trata dados nulos?",
"Explique ETL.",
"Como otimiza consultas SQL?"
],

frontend: [
"Explique o Virtual DOM.",
"Qual diferença entre var, let e const?",
"Como funciona React Hooks?",
"Explique responsividade.",
"Como melhora performance de aplicações web?"
],

gestao: [
"Como lidera equipes?",
"Como define prioridades?",
"Como resolve conflitos?",
"Como acompanha indicadores?",
"Como toma decisões estratégicas?"
]

};

if(nivel === "Intermediário"){

perguntas.push(
"Conte um desafio profissional que você superou."
);

perguntas.push(
"Como você trabalha sob pressão?"
);

}

if(nivel === "Sênior"){

perguntas.push(
"Como você lidera equipes?"
);

perguntas.push(
"Como toma decisões estratégicas?"
);

perguntas.push(
"Descreva um projeto de alto impacto."
);

}

/* ===========================
   MODO PRO IA
=========================== */

if(plano === "pro"){

if(
cargo.toLowerCase().includes("python")
){

perguntas.push(
"Explique orientação a objetos em Python."
);

perguntas.push(
"Quando utilizar threads e multiprocessing?"
);

perguntas.push(
"Como você estrutura APIs REST escaláveis?"
);

perguntas.push(
"Como faz tratamento de exceções?"
);

}

if(
cargo.toLowerCase().includes("dados")
){

perguntas.push(
"Explique a diferença entre JOIN e UNION."
);

perguntas.push(
"Como otimizar uma consulta SQL lenta?"
);

perguntas.push(
"Como construir dashboards executivos?"
);

}

if(vaga.includes("sql")){

perguntas.push(
"Descreva uma consulta SQL complexa que criou."
);

}

if(vaga.includes("excel")){

perguntas.push(
"Quais fórmulas avançadas do Excel utiliza?"
);

}

if(vaga.includes("power bi")){

perguntas.push(
"Como cria indicadores e dashboards?"
);

}

if(vaga.includes("liderança")){

perguntas.push(
"Descreva uma situação de liderança difícil."
);

}

if(vaga.includes("gestão")){

perguntas.push(
"Como define prioridades e metas?"
);

}

if(vaga.includes("atendimento")){

perguntas.push(
"Como lida com clientes insatisfeitos?"
);

}

if(vaga.includes("aws")){

perguntas.push(
"Quais serviços AWS você já utilizou?"
);

}

if(vaga.includes("docker")){

perguntas.push(
"Como funciona a conteinerização?"
);

}

if(vaga.includes("git")){

perguntas.push(
"Explique seu fluxo Git e GitHub."
);

}

}
let chave = "";

if(cargo.toLowerCase().includes("python")){
chave = "python";
}
else if(cargo.toLowerCase().includes("dados")){
chave = "dados";
}
else if(cargo.toLowerCase().includes("front")){
chave = "frontend";
}
else if(cargo.toLowerCase().includes("gest")){
chave = "gestao";
}


// Somente Plano Pro
if(plano === "pro" && chave){
perguntas.push(...perguntasPremium[chave]);
}
perguntas = [...new Set(perguntas)];

let corScore = "#ef4444";

if(score >= 80){
corScore = "#22c55e";
}
else if(score >= 60){
corScore = "#f59e0b";
}
   
/* ===========================
   SCORE
=========================== */

let score = 50;

if(nivel === "Intermediário"){
score += 20;
}

if(nivel === "Sênior"){
score += 40;
}

if(cargo.length > 3){
score += 10;
}
if(vaga.includes("python")) score += 5;
if(vaga.includes("sql")) score += 5;
if(vaga.includes("power bi")) score += 5;
if(vaga.includes("liderança")) score += 5;

if(score > 100){
score = 100;
}

// COLE AQUI
let feedback = "";

if(score >= 90){
feedback =
"🏆 Excelente desempenho para entrevistas.";
}
else if(score >= 70){
feedback =
"🚀 Bom desempenho, pequenas melhorias recomendadas.";
}
else{
feedback =
"⚠️ Recomendado praticar mais entrevistas.";
}

   
let nivelEntrevista = "";

if(score >= 90){
nivelEntrevista = "🏆 Especialista";
}
else if(score >= 75){
nivelEntrevista = "🚀 Avançado";
}
else if(score >= 60){
nivelEntrevista = "📈 Intermediário";
}
else{
nivelEntrevista = "📚 Iniciante";
}
   
let totalPerguntas = perguntas.length;
let perguntasPremiumCount =
totalPerguntas > 10
? totalPerguntas - 10
: 0;

let ranking = "";

if(score >= 95){
ranking = "🏆 Top 1%";
}
else if(score >= 90){
ranking = "🥇 Top 10%";
}
else if(score >= 80){
ranking = "🥈 Top 25%";
}
else{
ranking = "🥉 Top 50%";
}

   
   
/* ===========================
   RESULTADO
=========================== */

document.getElementById("resultado").innerHTML = `

<div class="card">

<h2>🎯 Simulação para ${cargo}</h2>

<p>
Nível:
<strong>${nivel}</strong>
</p>

<p>
Plano:
<strong>${plano.toUpperCase()}</strong>
</p>

<h3>🎤 Perguntas</h3>

<ol>

${perguntas.map(p => `
<li>${p}</li>
`).join("")}

</ol>

<h3>📊 Critérios Avaliados</h3>

<ul>

<li>Comunicação</li>

<li>Conhecimento Técnico</li>

<li>Liderança</li>

<li>Resolução de Problemas</li>

<li>Resultados Obtidos</li>

<li>Perfil Comportamental</li>

</ul>

<h3>📋 Dicas ATS</h3>

<ul>

<li>Utilize números e resultados.</li>

<li>Destaque tecnologias utilizadas.</li>

<li>Use palavras-chave da vaga.</li>

<li>Mostre impacto gerado.</li>

<li>Demonstre capacidade de resolver problemas.</li>

</ul>

<h3>🏆 Aprovação Estimada</h3>

<h3>🤖 Feedback da IA</h3>

<p style="
background:#f3f4f6;
padding:15px;
border-radius:10px;
font-weight:bold;
">
${feedback}
</p>

<h3>🎖️ Nível Profissional</h3>

<p style="
font-size:22px;
font-weight:bold;
color:#2563eb;
">
${nivelEntrevista}
</p>

<h3>📊 Estatísticas da Simulação</h3>

<ul>

<li>
Total de Perguntas:
<strong>${totalPerguntas}</strong>
</li>

<li>
Perguntas IA:
<strong>${perguntasPremiumCount}</strong>
</li>

<li>
Nível:
<strong>${nivel}</strong>
</li>

<li>
Plano:
<strong>${plano.toUpperCase()}</strong>
</li>

<li>
Compatibilidade:
<strong>${score}%</strong>
</li>

</ul>

<h3>⭐ Classificação Geral</h3>

<p style="
font-size:20px;
font-weight:bold;
color:#22c55e;
">
${score >= 90 ? "🏆 Elite" :
score >= 80 ? "🥇 Ouro" :
score >= 60 ? "🥈 Prata" :
"🥉 Bronze"}
</p>

<h3>🌎 Ranking Geral</h3>

<p style="
font-size:20px;
font-weight:bold;
color:#2563eb;
">
${ranking}
</p>
   

<div class="barra">

<div
class="progresso"
style="width:${score}%;">
</div>

</div>

<p>

<strong>${score}%</strong>

de compatibilidade.

</p>

</div>

`;

}

</script>

</body>
</html>
