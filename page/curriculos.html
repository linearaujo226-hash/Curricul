<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Currículos ATS</title>
<link rel="stylesheet" href="../assets/style.css">

<script>

function salvarDados(){

const campos = [
"nome",
"email",
"telefone",
"cidade",
"cargo",
"linkedin",
"formacao",
"experiencia",
"habilidades",
"conquistas",
"vaga"

];

campos.forEach(id => {

let campo = document.getElementById(id);

if(campo){
localStorage.setItem(id, campo.value);
}

});

}

function carregarDados(){

const campos = [
"nome",
"email",
"telefone",
"cidade",
"cargo",
"linkedin",
"formacao",
"experiencia",
"habilidades",
"conquistas",
"vaga"
];

campos.forEach(id => {

let campo = document.getElementById(id);

if(campo){
campo.value = localStorage.getItem(id) || "";
}

});

}
function carregarTema(){

if(localStorage.getItem("tema") === "true"){
document.body.classList.add("dark");
}

}
    
function trocarTema(){

document.body.classList.toggle("dark");

localStorage.setItem(
"tema",
document.body.classList.contains("dark")
);
}

window.addEventListener("DOMContentLoaded", () => {
carregarDados();
carregarTema();
});
function baixarArquivo(){

    const formato =
    document.getElementById("formatoDownload").value;

    if(formato === "pdf"){
        window.print();
        return;
    }

    let conteudo =
    document.getElementById("resultado").innerHTML;

    let mime =
    formato === "docx"
    ? "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
    : "application/msword";

   let blob = new Blob(
    [conteudo],
    {
    type:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"
    }
    );

    let link =
    document.createElement("a");

    link.href =
    URL.createObjectURL(blob);

    link.download =
    formato === "docx"
    ? "curriculo.docx"
    : "curriculo.doc";

    link.click();
}

    
</script>

</head>
    
<body>

<header>
    <h1>Contrata+ IA</h1>
</header>
    
<h2 style="text-align:center;">
🎯 Gerador de Currículos ATS Profissional
</h2>

<div class="container" style="max-width:900px;margin:auto;padding:20px;">

    <p>
    Crie currículos profissionais com análise ATS,
    pontuação automática e sugestões para aumentar
    suas chances de contratação.
    </p>

    <input type="text" id="nome" placeholder="Nome Completo" oninput="salvarDados()">
    

    <input type="email" id="email" placeholder="E-mail" oninput="salvarDados()">
    
    <input type="text" id="telefone" placeholder="Telefone" oninput="salvarDados()">
    
    <input type="text" id="cidade" placeholder="Cidade" oninput="salvarDados()">

    <input type="text" id="cargo" placeholder="Cargo Desejado" oninput="salvarDados()">
    <textarea id="vaga" placeholder="Cole aqui a descrição da vaga" oninput="salvarDados()"></textarea>
    
    
    <input type="text" id="linkedin" placeholder="LinkedIn" oninput="salvarDados()">
    
    <textarea id="formacao" placeholder="Formação Acadêmica" oninput="salvarDados()"></textarea>
    
    <textarea id="experiencia" placeholder="Experiência Profissional" oninput="salvarDados()"></textarea>
    
    <textarea id="habilidades" placeholder="Habilidades" oninput="salvarDados()"></textarea>
    
    <textarea id="conquistas" placeholder="Principais Conquistas" oninput="salvarDados()"></textarea>


    <input type="file" id="foto" accept="image/*">
    <select id="plano">
        <option value="gratis">🆓 Plano Gratuito</option>
        <option value="pro">🚀 Plano Pro</option>
        <option value="premium">👑 Plano Premium</option>
    </select>

    
    <button onclick="gerarCurriculo()">
    🚀 Gerar Currículo
    </button>
        <select id="formatoDownload">
        <option value="pdf">📄 PDF</option>
        <option value="doc">📝 Word (.doc)</option>
        <option value="docx">📘 Word (.docx)</option>
    </select>

    <button onclick="baixarArquivo()">
    ⬇️ Baixar Arquivo
    </button>
    
    <button onclick="localStorage.clear(); location.reload();">
    🗑️ Limpar Dados
    </button>
    
    <button onclick="exportarHistorico()">
    📤 Exportar Histórico
    </button>
    
    <button onclick="trocarTema()">
    🌙 Tema Escuro
    </button>

    <div id="mensagemErro" style="
    color:red;
    font-weight:bold;
    margin-top:10px;
    "></div>

    <div id="resultado"></div>
   
    </div>
    
    <script>
    function removerHistorico(index){

    let historico =
    JSON.parse(localStorage.getItem("historico")) || [];
    
    historico.splice(index,1);
    
    localStorage.setItem(
    "historico",
    JSON.stringify(historico)
    );
    
    localStorage.removeItem("nome");
    localStorage.removeItem("email");
    localStorage.removeItem("telefone");
    localStorage.removeItem("cidade");
    localStorage.removeItem("cargo");
    localStorage.removeItem("linkedin");
    localStorage.removeItem("formacao");
    localStorage.removeItem("experiencia");
    localStorage.removeItem("habilidades");
    localStorage.removeItem("conquistas");
    localStorage.removeItem("vaga");
    
    location.reload();
    
    }
    function exportarHistorico(){

    const historico =
    localStorage.getItem("historico") || "[]";
    
    const blob =
    new Blob([historico],
    {type:"application/json"});
    
    const link =
    document.createElement("a");
    
    link.href =
    URL.createObjectURL(blob);
    
    link.download =
    "historico.json";
    
    link.click();
    
    }


        
    
   function gerarCurriculo(){

    let resultado =
    document.getElementById("resultado");

    resultado.innerHTML =
    "<h3>⏳ Gerando currículo...</h3>";
    window.scrollTo({
    top: resultado.offsetTop,
    behavior: "smooth"
    });

    let mensagemErro =
    document.getElementById("mensagemErro");

    let plano =
    document.getElementById("plano").value;
    let vaga =
    (document.getElementById("vaga").value || "")
    .toLowerCase();

    if(
    document.getElementById("nome").value.trim() === "" ||
    document.getElementById("email").value.trim() === ""
    ){
        mensagemErro.innerHTML =
        "⚠️ Preencha pelo menos Nome e E-mail.";
    
        return;
    }
    
    mensagemErro.innerHTML = "";
        
    let nome = document.getElementById("nome").value;
    let email = document.getElementById("email").value;
    let telefone = document.getElementById("telefone").value;
    let cidade = document.getElementById("cidade").value;
    let cargo = document.getElementById("cargo").value;
    let linkedin = document.getElementById("linkedin").value;
    let formacao = document.getElementById("formacao").value;
    let experiencia = document.getElementById("experiencia").value;
    let habilidades = document.getElementById("habilidades").value;
    let conquistas = document.getElementById("conquistas").value;
    
    let score = 0;
    let nivelATS = "";
        
    const palavrasATS = [

    "liderança",
    "gestão",
    "excel",
    "python",
    "javascript",
    "html",
    "css",
    "sql",
    "projetos",
    "resultados",

    "power bi",
    "agile",
    "scrum",
    "kanban",
    "aws",
    "azure",
    "docker",
    "git",
    "github",
    "react",
    "node",
    "typescript",
    "linux"
    
    ];
    
   let palavrasEncontradas = 0;

    const textoCompleto =
    `${cargo} ${habilidades} ${experiencia} ${conquistas}`.toLowerCase();
    
    palavrasATS.forEach(palavra => {
        const regex =
        new RegExp(`\\b${palavra}\\b`, "i");
        
        if(regex.test(textoCompleto)){
        palavrasEncontradas++;
        }
    });
    
    const palavrasEncontradasLista = palavrasATS.filter(p =>
        textoCompleto.includes(p)
    );

    let palavrasHTML = "";
    
    if(palavrasEncontradasLista.length > 0){
        palavrasHTML = `
        <h3>🔍 Palavras-chave ATS Detectadas</h3>
        <p>
        ${palavrasEncontradasLista.map(p =>
        `<span style="
        background:#2563eb;
        color:white;
        padding:5px 10px;
        border-radius:20px;
        margin:3px;
        display:inline-block;
        ">${p}</span>`
        ).join("")}
        </p>
        `;
    }
    
    score += palavrasEncontradas * 3;
    if(nome.length > 5) score += 10;
    if(email.includes("@")) score += 10;
    if(telefone.length >= 10) score += 10;
    if(cidade.length > 2) score += 5;
    if(cargo.length > 3) score += 10;
    if(linkedin.length > 10) score += 10;
    if(formacao.length > 30) score += 15;
    if(experiencia.length > 80) score += 20;
    if(habilidades.length > 30) score += 15;
    if(conquistas.length > 30) score += 15;
    if(score > 100){
        score = 100;
    }
    if(score >= 90){
        nivelATS = "Elite";
    }else if(score >= 80){
        nivelATS = "Avançado";
    }else if(score >= 60){
        nivelATS = "Intermediário";
    }else{
        nivelATS = "Básico";
    }
    let sugestoes = "";
    
    if(score < 70){
        sugestoes =
        "Adicione mais experiência, habilidades e conquistas.";
    }else if(score < 90){
        sugestoes =
        "Seu currículo está bom, mas pode melhorar.";
    }else{
        sugestoes =
        "Excelente currículo para sistemas ATS.";
    }
    
    let classificacao = "";
    
    if(score < 50){
        classificacao = "🔴 Currículo Fraco";
    }else if(score < 80){
        classificacao = "🟡 Currículo Bom";
    }else{
        classificacao = "🟢 Currículo Excelente";
    }
    const perguntas = [
        "Fale sobre você.",
        "Quais são seus pontos fortes?",
        "Quais são seus pontos fracos?",
        "Por que devemos contratar você?",
        "Conte uma situação em que resolveu um problema.",
        "Como você trabalha sob pressão?",
        "Onde você se vê em 5 anos?"
    ];
    let carta = `
    Prezado recrutador,
    
    Tenho interesse na vaga de ${cargo}.
    
    Minha experiência inclui:
    ${experiencia}
    
    Atenciosamente,
    
    ${nome}
    `;
    
    let foto = document.getElementById("foto").files[0];
    
    let fotoHTML = "";
    
    
    
    if(foto){
        fotoHTML = `<img src="${URL.createObjectURL(foto)}"
        style="width:120px;height:120px;border-radius:50%;object-fit:cover;border:3px solid #2563eb;margin-bottom:15px;">`;
    }
    let recursosPro = "";
    let recursosPremium = "";
    if(plano === "pro"){
        recursosPro = `
        <h3>📄 Carta de Apresentação</h3>
        <pre>${carta}</pre>
        `;
    }
    if(plano === "premium"){
    recursosPremium = `
    <h3>🎤 Simulação de Entrevista</h3>
    <ul>
    ${perguntas.map(p => `<li>${p}</li>`).join("")}
    </ul>
    `;
}
    if(plano === "pro" || plano === "premium"){
        recursosPro = `
        ${recursosPro}
        ${recursosPremium}
        `;
    }
    
        
   
    let compatibilidadeATS = Math.min(score, 100);
    let compatibilidadeVaga = 0;

   const palavrasVaga =
    vaga.trim() === ""
    ? []
    : [...new Set(vaga.split(/\s+/))];
        let palavrasFaltando = [];
    
    palavrasVaga.forEach(p => {
    
        if(
            p.length > 4 &&
            !textoCompleto.includes(p)
        ){
            palavrasFaltando.push(p);
        }
    
    });
    
    palavrasVaga.forEach(palavra => {
    
        if(textoCompleto.includes(palavra)){
            compatibilidadeVaga++;
        }
    
    });
    
    compatibilidadeVaga =
    Math.min(
        Math.round(
            (compatibilidadeVaga / Math.max(palavrasVaga.length,1))*100
        ),
        100
    );
    
    let vagasIndicadas = [];

    if(textoCompleto.includes("python")){
        vagasIndicadas.push("🐍 Desenvolvedor Python");
    }
    
    if(textoCompleto.includes("javascript")){
        vagasIndicadas.push("🌐 Desenvolvedor Front-End");
    }
    
    if(textoCompleto.includes("sql")){
        vagasIndicadas.push("📊 Analista de Dados");
    }
    
    if(textoCompleto.includes("excel")){
        vagasIndicadas.push("📈 Assistente Administrativo");
    }
    
    let vagasHTML = "";
    
    if(vagasIndicadas.length > 0){
        vagasHTML = `
        <h3>💼 Vagas Compatíveis</h3>
        <ul>
        ${vagasIndicadas.map(v => `<li>${v}</li>`).join("")}
        </ul>
        `;
    }
    let empregabilidade = "";
        

    if(score >= 90){
        empregabilidade = "🔥 Muito Alta";
    }else if(score >= 80){
        empregabilidade = "🚀 Alta";
    }else if(score >= 60){
        empregabilidade = "📈 Média";
    }else{
        empregabilidade = "⚠️ Baixa";
    }

    let estrelasATS = "";

    if(score >= 90){
        estrelasATS = "⭐⭐⭐⭐⭐";
    }else if(score >= 80){
        estrelasATS = "⭐⭐⭐⭐";
    }else if(score >= 60){
        estrelasATS = "⭐⭐⭐";
    }else if(score >= 40){
        estrelasATS = "⭐⭐";
    }else{
        estrelasATS = "⭐";
    }

        
        
    let pontosFortes = [];
    
    if(linkedin.length > 10)
        pontosFortes.push("LinkedIn preenchido");
    
    if(experiencia.length > 80)
        pontosFortes.push("Boa experiência profissional");
    
    if(habilidades.length > 30)
        pontosFortes.push("Habilidades detalhadas");
    
    if(conquistas.length > 30)
        pontosFortes.push("Conquistas relevantes");
    
    if(pontosFortes.length === 0){
        pontosFortes.push("Nenhum ponto forte identificado ainda");
    }

    let pontosMelhoria = [];
    
    if(linkedin.length <= 10)
        pontosMelhoria.push("Adicionar LinkedIn");
    
    if(experiencia.length < 80)
        pontosMelhoria.push("Detalhar mais experiências");
    
    if(habilidades.length < 30)
        pontosMelhoria.push("Adicionar mais habilidades");
    
    if(conquistas.length < 30)
        pontosMelhoria.push("Adicionar conquistas profissionais");

    if(pontosMelhoria.length === 0){
            pontosMelhoria.push("Currículo muito bem preenchido");
        }
    
            
    let seloATS = "";

    if(score >= 90){
        seloATS = "🏆 ATS Elite";
    }else if(score >= 80){
        seloATS = "🥇 ATS Ouro";
    }else if(score >= 60){
        seloATS = "🥈 ATS Prata";
    }else{
        seloATS = "🥉 ATS Bronze";
    }

    let ranking = "";

    if(score >= 95){
    ranking = "🏆 Top 1%";
    }
    else if(score >= 90){
    ranking = "🥇 Top 10%";
    }
    else if(score >= 80){
    ranking = "🥈 Top 25%";
    }
    else{
    ranking = "🥉 Top 50%";
    }

    let historico =
    JSON.parse(localStorage.getItem("historico")) || [];
    
    if (
    !historico.some(item =>
    item.nome === nome &&
    item.cargo === cargo
    )
    ){
    historico.push({
    nome,
    cargo,
    score,
    data:new Date().toLocaleDateString("pt-BR")
    });
    }
    if(historico.length > 20){
        historico.shift();
        
    }
    localStorage.setItem(
    "historico",
    JSON.stringify(historico)
    );

    function limparTexto(texto){
    return texto
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
    }    
    nome = limparTexto(nome);
    email = limparTexto(email);
    cargo = limparTexto(cargo);
    telefone = limparTexto(telefone);
    cidade = limparTexto(cidade);
    linkedin = limparTexto(linkedin);
    formacao = limparTexto(formacao);
    experiencia = limparTexto(experiencia);
    habilidades = limparTexto(habilidades);
    conquistas = limparTexto(conquistas);

        
            
        resultado.innerHTML = `
    ${fotoHTML}
    
    <hr>
    <p>
    <strong>Gerado em:</strong>
    ${new Date().toLocaleDateString("pt-BR")}
    </p>
    
    <h2>${nome}</h2>
    
    <p><strong>E-mail:</strong> ${email}</p>
    
    <p><strong>Telefone:</strong> ${telefone}</p>
    
    <p><strong>Cidade:</strong> ${cidade}</p>
    
    <p><strong>LinkedIn:</strong> ${linkedin}</p>
    
    <p><strong>Cargo:</strong> ${cargo}</p>
    
    <h3>🌎 Ranking Geral</h3>

    <p>${ranking}</p>
    <h3>🎯 Score ATS: ${score}/100</h3>
    <h3>🏅 Nível ATS: ${nivelATS}</h3>
    
    <h3>🏅 Certificação ATS</h3>
    <p style="
    font-size:22px;
    font-weight:bold;
    color:#2563eb;
    ">
    ${seloATS}
    </p>

    <h3>⭐ Ranking ATS</h3>
    <p style="
    font-size:28px;
    color:#f59e0b;
    ">
    ${estrelasATS}
    </p>
    
    <h3>📊 Compatibilidade ATS</h3>
    <div style="
    background:#eee;
    height:30px;
    border-radius:20px;
    overflow:hidden;
    ">
    <div style="
    width:${compatibilidadeATS}%;
    height:100%;
    background:#2563eb;
    ">
    </div>
    </div>

    <h3>🎯 Compatibilidade com a Vaga</h3>
    <div style="
    background:#ddd;
    height:25px;
    border-radius:20px;
    overflow:hidden;
    ">
    
    <div style="
    width:${compatibilidadeVaga}%;
    height:100%;
    background:#22c55e;
    ">
    </div>
    
    </div>

    <p>
    <strong>${compatibilidadeVaga}%</strong>
    </p>
    
    <p>${compatibilidadeATS}% compatível com sistemas ATS</p>
    <p>
    🎯 Probabilidade estimada de aprovação:
    <strong>${Math.min(score + 5, 100)}%</strong>
    </p>
    
    <div style="
    width:100%;
    height:25px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:15px;
    ">
    
    <div style="
    width:${score}%;
    height:100%;
    background:#22c55e;
    ">
    </div>
    </div>

    
    <h3>📈 Empregabilidade</h3>
    <p>
    <strong>${empregabilidade}</strong>
    </p>
    
    <h3>${classificacao}</h3>
    <h3>🤖 Análise ATS</h3>
    <p>
    
    
    Palavras-chave encontradas:
    <strong>${palavrasEncontradas}</strong>
    </p>
    ${palavrasHTML}
    ${vagasHTML}
    

    <h3>💡 Sugestões</h3>
    <p>${sugestoes}</p>
    
    <h3>📝 Resumo Profissional</h3>
    <p>
    Profissional interessado em atuar como
    ${cargo}, com experiência em
    ${habilidades}.
    </p>
    
    <h3>🎓 Formação</h3>
    <p>${formacao}</p>
    
    <h3>💼 Experiência</h3>
    <p>${experiencia}</p>
    
    <h3>🚀 Habilidades</h3>
    <p>${habilidades}</p>
    
    <h3>🏆 Conquistas</h3>
    <p>${conquistas}</p>

    <h3>⭐ Pontos Fortes</h3>
    <ul>
    ${pontosFortes.map(p => `<li>${p}</li>`).join("")}
    </ul>
    <h3>📌 Pontos de Melhoria</h3>
    <ul>
    ${pontosMelhoria.map(p => `<li>${p}</li>`).join("")}
    </ul>

    <h3>📊 Resumo Geral</h3>

    <table border="1" width="100%">
    <tr>
    <th>Indicador</th>
    <th>Valor</th>
    </tr>
    
    <tr>
    <td>ATS</td>
    <td>${score}%</td>
    </tr>
    
    <tr>
    <td>Empregabilidade</td>
    <td>${empregabilidade}</td>
    </tr>
    
    <tr>
    <td>Compatibilidade</td>
    <td>${compatibilidadeVaga}%</td>
    </tr>
    
    </table>

    ${recursosPro}
    <h3>📚 Histórico</h3>
    <ul>
    ${
    historico.map((item,index) => `
    <li>
    ${item.data} -
    ${item.nome}
    (${item.cargo})
    Score ${item.score}
    
    <button onclick="removerHistorico(${index})">
    ❌
    </button>
    
    </li>
    `).join("")
    }
    </ul>

    <h3>🔎 Palavras Importantes da Vaga</h3>

    <p>
    ${palavrasFaltando.slice(0,10).join(", ")}
    </p>

   
    `;
    
}
</script>

</body>
</html>
