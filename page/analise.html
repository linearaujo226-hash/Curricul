<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análise ATS - Contrata+ IA</title>
<link rel="stylesheet" href="../assets/style.css">

<style>
.container{
max-width:1000px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
margin-top:20px;
}

textarea{
width:100%;
height:250px;
padding:15px;
border:1px solid #ddd;
border-radius:8px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

#resultado{
margin-top:20px;
padding:20px;
border-radius:10px;
background:#f8fafc;
}
</style>

</head>

<body>

<header>
<h1>Contrata+ IA</h1>
</header>

<div class="container">

<h2>🔍 Análise Inteligente de Currículo</h2>

<p>Cole seu currículo abaixo:</p>

<textarea id="curriculo"></textarea>

<button onclick="analisarCurriculo()">
Analisar Currículo
</button>

<div id="resultado"></div>

</div>

<script>

function analisarCurriculo(){

let texto =
document.getElementById("curriculo").value;

let score = 0;

let pontosFortes = [];
let melhorias = [];

if(texto.length > 300){
score += 20;
pontosFortes.push("Currículo detalhado.");
}else{
melhorias.push("Adicionar mais detalhes.");
}

if(texto.includes("LinkedIn")){
score += 15;
pontosFortes.push("Possui LinkedIn.");
}else{
melhorias.push("Adicionar LinkedIn.");
}

if(texto.includes("Experiência")){
score += 20;
pontosFortes.push("Experiência profissional encontrada.");
}else{
melhorias.push("Adicionar experiência profissional.");
}

if(texto.includes("Formação")){
score += 15;
pontosFortes.push("Formação acadêmica encontrada.");
}else{
melhorias.push("Adicionar formação acadêmica.");
}

if(texto.includes("Habilidades")){
score += 15;
pontosFortes.push("Habilidades encontradas.");
}else{
melhorias.push("Adicionar habilidades.");
}

if(texto.includes("%")){
score += 15;
pontosFortes.push("Resultados mensuráveis encontrados.");
}else{
melhorias.push("Adicionar números e resultados.");
}

if(score > 100){
score = 100;
}

document.getElementById("resultado").innerHTML = `

<h2>🎯 Score ATS: ${score}/100</h2>

<h3>✅ Pontos Fortes</h3>

<ul>
${pontosFortes.map(item => `<li>${item}</li>`).join("")}
</ul>

<h3>⚠️ Melhorias</h3>

<ul>
${melhorias.map(item => `<li>${item}</li>`).join("")}
</ul>

`;

}

</script>

</body>
</html>
